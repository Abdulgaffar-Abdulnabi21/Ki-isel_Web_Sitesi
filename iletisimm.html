<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İletişim</title>
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-container">
      <a href="index.html" class="brand">Kişisel Web Sitem</a>
      <button class="nav-toggle" aria-label="Menüyü Aç/Kapat">☰</button>
      <nav class="navbar">
        <a href="index.html">Hakkımda</a>
        <a href="ozg.html">Özgeçmiş</a>
        <a href="sehir.html">Şehrim</a>
        <a href="mirasimiz.html">Mirasımız</a>
        <a href="ilgili.html">İlgi Alanlarım</a>
        <a href="iletisimm.html">İletişim</a>
        <a href="PHP/giris.php">Login</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <section class="form-card" id="vueApp">
      <span class="badge">Bana Ulaşın</span>
      <h1>İletişim Formu</h1>
      <p class="form-description">
        Aşağıdaki formu doldurarak mesaj gönderebilirsiniz.
      </p>

      <form id="contactForm" action="PHP/contact.php" method="POST" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Ad</label>
            <input type="text" name="name" id="name" v-model="form.name" placeholder="Adınızı giriniz">
          </div>

          <div class="form-group">
            <label for="surname">Soyad</label>
            <input type="text" name="surname" id="surname" v-model="form.surname" placeholder="Soyadınızı giriniz">
          </div>

          <div class="form-group">
            <label for="gender">Cinsiyet</label>
            <select name="gender" id="gender" v-model="form.gender">
              <option value="">Seçiniz</option>
              <option value="Erkek">Erkek</option>
              <option value="Kadın">Kadın</option>
            </select>
          </div>

          <div class="form-group">
            <label for="country">Ülke</label>
            <input type="text" name="country" id="country" v-model="form.country" placeholder="Ülkenizi giriniz">
          </div>

          <div class="form-group">
            <label for="email">E-posta</label>
            <input type="email" name="email" id="email" v-model="form.email" placeholder="ornek@mail.com">
          </div>

          <div class="form-group">
            <label for="phone">Telefon</label>
            <input type="text" name="phone" id="phone" v-model="form.phone" placeholder="05XXXXXXXXX">
          </div>
        </div>

        <div class="form-group">
          <label for="message">Mesaj</label>
          <textarea name="message" id="message" v-model="form.message" placeholder="Mesajınızı yazınız"></textarea>
        </div>

        <div id="errorMessages" class="message-box"></div>

        <div v-if="vueErrors.length > 0" class="message-box">
          <p v-for="(error, index) in vueErrors" :key="index">{{ error }}</p>
        </div>

        <div v-if="vueSuccessMessage" class="message-box">
          <p class="success">{{ vueSuccessMessage }}</p>
        </div>

        <div class="button-group">
          <button type="submit" class="btn primary-btn">Gönder</button>
          <button type="reset" class="btn danger-btn" @click="clearVueMessages">Temizle</button>
          <button type="button" class="btn secondary-btn" id="js-kontrol">JS Kontrol</button>
          <button type="button" class="btn secondary-btn" @click="validateVueForm">Vue Kontrol</button>
        </div>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="java/iletisimscript.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="java/vue-form.js"></script>
</body>
</html>
